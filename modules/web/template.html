<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Club Deportivo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* =====================
   BASE
===================== */
html, body {
    height: 100%;
    margin: 0;
}
body {
    display: flex;
    flex-direction: column;
}
.contenido-principal {
    flex: 1;
}

/* =====================
   NAVBAR
===================== */
.navbar-ecommerce {
    background-color: #000;
    border-bottom: 4px solid #fff;
    box-shadow: 0 4px 14px rgba(0,0,0,.6);
}
.logo {
    max-height: 80px;
}
.navbar-nav {
    gap: 2rem;
}
.navbar-nav .nav-link {
    color: #fff;
    font-weight: 700;
    text-transform: uppercase;
    font-size: .95rem;
    position: relative;
}
.navbar-nav .nav-link::after {
    content: "";
    position: absolute;
    bottom: -6px;
    left: 0;
    width: 0;
    height: 3px;
    background: #fff;
    transition: .25s;
}
.navbar-nav .nav-link:hover::after {
    width: 100%;
}
.icon-btn {
    color: #fff;
    font-size: 1.3rem;
}
.custom-toggler {
    border: none;
}
.custom-toggler .navbar-toggler-icon {
    background-color: #fff;
    height: 3px;
    width: 26px;
    position: relative;
}
.custom-toggler .navbar-toggler-icon::before,
.custom-toggler .navbar-toggler-icon::after {
    content: "";
    position: absolute;
    width: 26px;
    height: 3px;
    background: #fff;
    left: 0;
}
.custom-toggler .navbar-toggler-icon::before { top: -8px; }
.custom-toggler .navbar-toggler-icon::after { top: 8px; }

/* =====================
   FOOTER
===================== */
.footer-portal {
    background: #000;
    color: #fff;
    border-top: 4px solid #fff;
    box-shadow: 0 -4px 14px rgba(0,0,0,.6);
}
.footer-logo {
    max-height: 90px;
    transform: scale(1.5);
    transform-origin: left center;
}
.footer-links {
    list-style: none;
    padding: 0;
    margin: 0;
}
.footer-links li {
    margin: .5rem 0;
}
.footer-links a {
    color: #fff;
    font-weight: 700;
    text-transform: uppercase;
    font-size: .9rem;
    text-decoration: none;
}
.footer-links a:hover {
    opacity: .75;
}

/* =====================
   LIBRO DE QUEJAS
===================== */
.footer-title {
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 1rem;
    font-size: .95rem;
}
.footer-input,
.footer-textarea {
    width: 100%;
    background: transparent;
    border: 1px solid rgba(255,255,255,.6);
    color: #fff;
    padding: .45rem .6rem;
    font-size: .85rem;
}
.footer-input::placeholder,
.footer-textarea::placeholder {
    color: rgba(255,255,255,.6);
}
.footer-btn {
    width: 100%;
    background: #fff;
    color: #000;
    border: none;
    padding: .45rem;
    font-weight: 700;
    text-transform: uppercase;
    font-size: .8rem;
    letter-spacing: 1px;
}
.footer-bottom {
    border-top: 1px solid rgba(255,255,255,.15);
    padding: 1rem 0;
    font-size: .85rem;
    text-align: center;
}

</style>
    {% block styles %}
    {% endblock %}
</head>

<body>

<!-- =====================
     NAVBAR
===================== -->
<nav class="navbar navbar-expand-lg navbar-ecommerce sticky-top">
  <div class="container">

    <a class="navbar-brand" href="/">
      <img src="/img/logo.png" class="logo">
    </a>

    <button class="navbar-toggler custom-toggler" data-bs-toggle="collapse" data-bs-target="#navbarMain">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMain">

      <!-- LINKS CENTRALES -->
      <ul class="navbar-nav mx-auto">
        <li><a class="nav-link" href="/Web/equipos">Inicio</a></li>
        <li><a class="nav-link" href="/Inicioweb">Deportes</a></li>
        <li><a class="nav-link" href="/">Historia</a></li>
        <li><a class="nav-link" href="/">Socios</a></li>
        <li><a class="nav-link" href="/">Contacto</a></li>
      </ul>

      <!-- DERECHA -->
      <div class="d-flex align-items-center gap-3">

        <!-- DROPDOWN HACERME SOCIO -->
        <div class="dropdown">
          <button
            class="btn btn-warning fw-bold text-uppercase dropdown-toggle"
            data-bs-toggle="dropdown"
            aria-expanded="false">
            Hacerme socio
          </button>

          <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
            <li>
              <a class="dropdown-item" href="/socios/deportivo">
                Socio Deportivo
              </a>
            </li>
            <li>
              <a class="dropdown-item" href="/socios/activo">
                Socio Activo
              </a>
            </li>
          </ul>
        </div>

        <!-- BOTÓN GESTIÓN (SIN CAMBIOS) -->
        <a href="/gestion" class="icon-btn">
          <i class="bi bi-gear-fill"></i>
        </a>

      </div>

    </div>
  </div>
</nav>


<div class="contenido-principal"></div>

<!-- =====================
     FOOTER
===================== -->
<footer class="footer-portal mt-auto">
  <div class="container py-5">
    <div class="row gy-4 align-items-start">

      <!-- LOGO -->
      <div class="col-12 col-md-4">
        <img src="/img/logo.png" class="footer-logo mb-3">
      </div>

      <!-- LINKS -->
      <div class="col-12 col-md-4 text-center">
        <ul class="footer-links">
          <li><a href="/Web/equipos">Inicio</a></li>
          <li><a href="/Inicioweb">Deportes</a></li>
          <li><a href="/">Historia</a></li>
          <li><a href="/">Socios</a></li>
          <li><a href="/">Contacto</a></li>
        </ul>
      </div>

      <!-- LIBRO DE QUEJAS -->
      <div class="col-12 col-md-4">
        <h5 class="footer-title">Libro de Quejas</h5>

        <form method="POST" action="/quejas">
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="anonimo" name="anonimo" value="1" checked>
            <label class="form-check-label">Enviar de forma anónima</label>
          </div>

          <div id="datosPersonales" style="display:none;">
            <input class="footer-input mb-2" name="nombre" placeholder="Nombre y apellido">
            <input class="footer-input mb-2" name="email" placeholder="Email">
          </div>

          <textarea class="footer-textarea mb-2" name="mensaje" rows="4"
            placeholder="Escriba su queja o sugerencia..." required></textarea>

          <button class="footer-btn">Enviar</button>
        </form>
      </div>

    </div>
  </div>

  <div class="footer-bottom">
    © 2026 · Hecho por <strong>LE Devs</strong> · Todos los derechos reservados
  </div>
</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const chk = document.getElementById('anonimo');
  const datos = document.getElementById('datosPersonales');
  const inputs = datos.querySelectorAll('input');

  function toggleDatos() {
    const anon = chk.checked;
    datos.style.display = anon ? 'none' : 'block';
    inputs.forEach(i => {
      i.disabled = anon;
      if (anon) i.value = '';
    });
  }
  chk.addEventListener('change', toggleDatos);
  toggleDatos();
</script>

</body>
</html>
