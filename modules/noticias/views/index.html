{% extends '../../template.html' %}

{% block styles %}
<style>

</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center">
    <h2>{{ pagename }}</h2>
    <div class="d-flex align-items-end mb-3" style="gap: 0.2rem;">
        <input type="text" class="form-control form-control-sm" id="txtFiltro" placeholder="Buscar" style="width: 10rem;" />
        {% if permisos.a == 1 %}
        <button class="btn btn-sm btn-round btn-success modalAccion mr-1" data-accion="a" onclick='ModalAccion("a")'>
            <i class="fa fa-plus"></i>
        </button>
        {% endif %}
    </div>
</div>
<div class="table-responsive" style="height: calc(100vh - 200px)" id="tablaDatos">
    <table class="table table-sm table-fix table-hover tableFixHead">
        <thead>
            <tr>
                <th scope="col">Acciones</th>
                <th scope="col">Titulo</th>
                <th scope="col">SubTitulo</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- MODAL -->
<div class="modal fade modal-m" data-backdrop="static" data-bs-keyboard="false" tabindex="-1"
    aria-labelledby="staticBackdropLabel" aria-hidden="true" id="modal">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalLabel"></h5>
                <button type="button" class="close" aria-label="Close" onclick="CerrarModal()">
                    <span aria-hidden=" true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="form-group col-sm-12">
                        <label for="titulo">Titulo</label>
                        <input type="text" class="form-control form-control-sm" id="titulo" maxlength="100">
                    </div>
                    <div class="form-group col-sm-12">
                        <label for="subtitulo">SubTitulo</label>
                        <input type="text" class="form-control form-control-sm" id="subtitulo" maxlength="200">
                    </div>
                </div>
                <div class="row">
                    <div class="form-group col-sm-12">
                        <label for="descripcion">Descripcion</label>
                        <textarea class="form-control form-control-sm" id="descripcion" rows="10" maxlength="3000"></textarea>
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="form-group col-sm-12">
                        <label for="imagen">Imagen <small class="text-muted">(opcional, máx. 5MB)</small></label>
                        <input type="file" class="form-control form-control-sm" id="imagen" accept="image/*">
                        <div id="imagenPreviewWrap" style="display:none; margin-top:8px;">
                            <img id="imagenPreview" src="" style="max-height:140px; border-radius:8px; border:1px solid #ddd;">
                            <div class="mt-1"><small class="text-muted" id="imagenActualLabel"></small></div>
                        </div>
                    </div>
                </div>
                <button type="button" class="btn btn-secondary" onclick="CerrarModal()">Cancelar</button>
                <button type="button" class="btn btn-success" id="btnAccion">Guardar</button>
            </div>
        </div>
    </div>
    </div>

<!-- MODAL VER (solo lectura) -->
<div class="modal fade" id="modalVer" tabindex="-1" aria-labelledby="modalVerLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalVerLabel">Ver noticia</h5>
                <button type="button" class="close" aria-label="Close" onclick="$('#modalVer').modal('hide')">
                    <span aria-hidden=" true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <h3 id="verTitulo"></h3>
                <h5 id="verSubtitulo" class="text-muted" style="margin-bottom:1rem;"></h5>
                <div id="verDescripcion"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="$('#modalVer').modal('hide')">Cerrar</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    $(document).ready(async () => {
        getLista()

        $('#imagen').on('change', function() {
            const file = this.files[0]
            if (file) {
                const reader = new FileReader()
                reader.onload = e => {
                    $('#imagenPreview').attr('src', e.target.result)
                    $('#imagenActualLabel').text('')
                    $('#imagenPreviewWrap').show()
                }
                reader.readAsDataURL(file)
            }
        })
    })

    $("#txtFiltro").keyup(async function () {
        Filtrar()
    })
    
    const getLista = async () => {
        $("#preloaderAPP").show()
        const res = await $.post('/noticias/getListaAjax')
        let html = ""
        if(res.status){
            for (let i = 0; i < res.data.length; i++) {
                html += `
                    <tr>
                        <td>
                            <div style="display: flex; gap: 6px; align-items:center;">
                                <button class="btn btn-round btn-sm btn-info" onclick="VerNoticia(${res.data[i].id})"
                                    data-toggle="tooltip" data-placement="top" title="Ver">
                                    <i class="fa fa-eye"></i>
                                </button>
                                {% if permisos.m == 1 %}
                                    <button class="btn btn-round btn-sm btn-warning" data-accion="m"
                                        data-toggle="tooltip" data-placement="top" title="Modificar" onclick="ModalAccion('m',${res.data[i].id})">
                                        <i class="fa fa-pen"></i>
                                    </button>
                                {% endif %}

                                {% if permisos.b == 1 %}
                                    <button class="btn btn-round btn-sm btn-danger" onclick="Eliminar(${res.data[i].id})"
                                        data-toggle="tooltip" data-placement="top" title="Eliminar">
                                        <i class="fa fa-trash-alt"></i>
                                    </button>
                                {% endif %}
                            </div>
                        </td>
                        <td class='search'>${res.data[i].titulo}</td>
                        <td>${res.data[i].subtitulo}</td>
                    </tr>`
            }
        }else{
            html = `<tr><td class="font-weight-bold" colspan="3">${res.text}</td></tr>`
        }
        $('#tablaDatos tbody').html(html)
        $("#preloaderAPP").hide()
        $('[data-toggle="tooltip"]').tooltip()
    }

    const ModalAccion = async (accion, id) => {
        $("#preloaderAPP").show()
        if (accion === 'a') {
            $('#modalLabel').text('Nueva noticia')
            $('#btnAccion').attr('onclick', `PostRegistro("a")`)
            $('#btnAccion').text('Guardar')
        }
        if (accion == 'm') {
            let res = await $.post(`/noticias/getByIdAjax`, {id})
            if (res.status != 0) {
                $('#titulo').val(res.data[0].titulo)
                $('#subtitulo').val(res.data[0].subtitulo)
                $('#descripcion').val(res.data[0].descripcion)
                if (res.data[0].imagen_url) {
                    $('#imagenPreview').attr('src', res.data[0].imagen_url)
                    $('#imagenActualLabel').text('Imagen actual (subir nueva reemplaza esta)')
                    $('#imagenPreviewWrap').show()
                } else {
                    $('#imagenPreviewWrap').hide()
                }
            }
            $('#modalLabel').text('Modificar noticia')
            $('#btnAccion').text('Guardar')
            $('#btnAccion').attr('onclick', `PostRegistro("m",${id})`)
            $('#actionSeccion').removeClass('d-none')
            $('#actionSeccionDivider').removeClass('d-none')
        }
        $("#preloaderAPP").hide()
        $('#modal').modal('show')
    }

    const VerNoticia = async (id) => {
        try {
            $('#preloaderAPP').show()
            let res = await $.post('/noticias/getByIdAjax', { id })
            $('#preloaderAPP').hide()
            if (res.status && res.data && res.data.length) {
                let d = res.data[0]
                $('#verTitulo').text(d.titulo)
                $('#verSubtitulo').text(d.subtitulo)
                // Mantener saltos de línea
                $('#verDescripcion').html((d.descripcion || '').replace(/\n/g, '<br/>'))
                $('#modalVer').modal('show')
            } else {
                Swal.fire({ icon: 'warning', title: 'Atención', text: res.text || 'No se encontró la noticia', timer: 2000 })
            }
        } catch (err) {
            console.log(err)
            $('#preloaderAPP').hide()
            Swal.fire({ icon: 'error', title: 'Error', text: 'Error al obtener la noticia', timer: 2000 })
        }
    }

    const PostRegistro = async (accion, Id) => {
        $("#preloaderAPP").show()
        let url = '/noticias/alta'

        const formData = new FormData()
        formData.append('titulo', $('#titulo').val())
        formData.append('subtitulo', $('#subtitulo').val())
        formData.append('descripcion', $('#descripcion').val())
        const imagenFile = $('#imagen')[0].files[0]
        if (imagenFile) formData.append('imagen', imagenFile)

        if (accion === 'm') {
            url = '/noticias/modificar'
            formData.append('id', Id)
        }

        const res = await $.ajax({
            url,
            type: 'POST',
            data: formData,
            processData: false,
            contentType: false
        })
        $("#preloaderAPP").hide()
        Swal.fire({
            icon: res.icon,
            title: res.title, 
            text: res.text, 
            timer: 2000
        }).then(() => {
            if(res.status){
                CerrarModal()
                getLista()
            }
        })        
    }

    const Eliminar = (id) => {
        Swal.fire({
            title: 'Confirmar',
            text: "¿Desea borrar este registro?",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#3085d6',
            confirmButtonText: 'Sí, eliminar.',
            cancelButtonColor: '#d33',
            cancelButtonText: 'No, cancelar.'
        }).then(async result => {
            if (result.isConfirmed) {
                $("#preloaderAPP").show();
                let res = await $.post('/noticias/eliminar', { id })
                $("#preloaderAPP").hide();
                Swal.fire({
                    type: res.type,
                    icon: res.icon,
                    title: res.title,
                    text: res.text,
                    timer: 2000
                }).then(() => {
                    if(res.status){
                        CerrarModal()
                        getLista()
                    }
                })
            }    
        })
    }

    const Filtrar = () => {
        $('#tablaDatos tbody tr').each(function () {
            if ($(this).find('td.search').text().toUpperCase().indexOf($('#txtFiltro').val().toUpperCase()) > -1)
                $(this).closest('tr').show();
            else
                $(this).closest('tr').hide();
        })
    }

    const CerrarModal = () => {
        $('#modal').modal('hide')
        $('#actionSeccion').addClass('d-none')
        $('#actionSeccionDivider').addClass('d-none')
        LimpiarCampos()
    }

    const LimpiarCampos = () => {
        $('input[type="text"]').val('')
        $('textarea').val('')
        $('#imagen').val('')
        $('#imagenPreviewWrap').hide()
        $('#imagenPreview').attr('src', '')
        $('#imagenActualLabel').text('')
        $('#cmbEquipo').val('')
        $('input[type="checkbox"]').prop('checked', false)
        $('input[type="radio"]').prop('checked', false)
    }

</script>
{% endblock %}
