{% extends '../../template.html' %}

{% block title %} {{ pagename }} {% endblock %}


{% block styles %}
<style>
    .shortcut-grid .shortcut-btn {
        aspect-ratio: 1 / 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-radius: 14px;
        padding: 1.4rem 1rem;
        font-weight: 600;
        text-decoration: none;
        background: #ffffff;
        border: 1.5px solid #e8edf2;
        box-shadow: 0 2px 8px rgba(35,46,56,0.07);
        transition: transform .13s ease, box-shadow .18s ease, border-color .13s ease;
        gap: 0;
        position: relative;
    }

    .shortcut-grid .shortcut-btn .sc-icon {
        width: 64px;
        height: 64px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f0f5fb;
        color: #232e38;
        font-size: 26px;
        margin-bottom: .7rem;
        flex-shrink: 0;
        transition: background .13s ease;
    }

    .shortcut-grid .shortcut-btn .sc-label {
        font-size: 1rem;
        font-weight: 600;
        color: #232e38;
        text-align: center;
        line-height: 1.25;
    }

    .shortcut-grid .shortcut-btn:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 28px rgba(35,46,56,0.13);
        border-color: #c0cedb;
    }

    .shortcut-grid .shortcut-btn:hover .sc-icon {
        background: #232e38;
        color: #fff;
    }

    .shortcut-grid .shortcut-btn:active {
        transform: translateY(-2px);
        box-shadow: 0 4px 10px rgba(35,46,56,0.1);
    }

    @media (max-width: 576px) {
        .shortcut-grid .shortcut-btn .sc-icon { width: 52px; height: 52px; font-size: 22px; }
        .shortcut-grid .shortcut-btn .sc-label { font-size: .9rem; }
    }

    /* unread count badge */
    .sc-badge {
        position: absolute;
        top: 8px;
        right: 10px;
        min-width: 22px;
        height: 22px;
        padding: 0 6px;
        border-radius: 12px;
        background: #dc3545;
        color: #fff;
        font-size: 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }
</style>
{% endblock %}


{% block content %}
    <h2 class="m-0">Hola, Club La Emilia! 👋 Por donde empezamos hoy?</h2>

    <div class="mt-4 shortcut-grid">
        <div class="row gx-3 gy-3">
            <div class="col-6 col-sm-4 col-md-3 col-lg-2">
                <a href="/secciones" class="shortcut-btn w-100" role="button">
                    <div class="sc-icon"><i class="fa fa-th-large"></i></div>
                    <span class="sc-label">Secciones</span>
                </a>
            </div>

            <div class="col-6 col-sm-4 col-md-3 col-lg-2">
                <a href="/deportes" class="shortcut-btn w-100" role="button">
                    <div class="sc-icon"><i class="fa fa-futbol"></i></div>
                    <span class="sc-label">Deportes</span>
                </a>
            </div>

            <div class="col-6 col-sm-4 col-md-3 col-lg-2 position-relative">
                <a href="/quejas" class="shortcut-btn w-100" role="button">
                    <div class="sc-icon"><i class="fa fa-comments"></i></div>
                    <span class="sc-label">Quejas</span>
                    <span id="quejas_unread_badge" class="sc-badge d-none">0</span>
                </a>
            </div>

            <div class="col-6 col-sm-4 col-md-3 col-lg-2">
                <a href="/Solicitudes" class="shortcut-btn w-100" role="button">
                    <div class="sc-icon"><i class="fa fa-user-plus"></i></div>
                    <span class="sc-label">Solicitudes de Socios</span>
                </a>
            </div>

            <div class="col-6 col-sm-4 col-md-3 col-lg-2">
                <a href="/noticias" class="shortcut-btn w-100" role="button">
                    <div class="sc-icon"><i class="fa fa-newspaper"></i></div>
                    <span class="sc-label">Noticias</span>
                </a>
            </div>
        </div>
    </div>
{% endblock %}



{% block scripts %}
<script type="text/javascript" src="/js/vencimientos.js"></script>
<script type="text/javascript">

    const updateQuejasUnread = () => {
        fetch('/quejas/countUnread', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        })
        .then(res => res.json())
        .then(response => {
            const badge = document.getElementById('quejas_unread_badge');
            if (!badge) return;

            if (!response.status) {
                badge.classList.add('d-none');
                return;
            }

            const count = Number(response.total || 0);

            if (count > 0) {
                badge.innerText = count > 99 ? '99+' : count;
                badge.classList.remove('d-none');
            } else {
                badge.classList.add('d-none');
            }
        })
        .catch(err => {
            console.error('Error fetching quejas unread count', err);
        });
    }

    document.addEventListener('DOMContentLoaded', function () {
        try { updateQuejasUnread(); } catch (e) {}
        // refresh every 60 seconds
        setInterval(updateQuejasUnread, 60000);
    });

</script>
{% endblock %}
