{% extends '../../template.html' %}

{% block styles %}
<style>

</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center">
    <h2>{{ pagename }}</h2>
    <div class="d-flex align-items-end mb-3" style="gap: 0.2rem;">
        <input type="text" class="form-control form-control-sm" id="txtFiltro" placeholder="Buscar" style="width: 10rem;" />
        {% if permisos.a == 1 %}
        <button class="btn btn-sm btn-round btn-success modalAccion mr-1" data-accion="a" onclick='ModalAccion("a")'>
            <i class="fa fa-plus"></i>
        </button>
        {% endif %}
    </div>
</div>
<div class="table-responsive" style="height: calc(100vh - 200px)" id="tablaDatos">
    <table class="table table-sm table-fix table-hover tableFixHead">
        <thead>
            <tr>
                <th scope="col">Acciones</th>
                <th scope="col">Deporte</th>
                <th scope="col">Descripcion</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- MODAL -->
<div class="modal fade modal-m" data-backdrop="static" data-bs-keyboard="false" tabindex="-1"
    aria-labelledby="staticBackdropLabel" aria-hidden="true" id="modal">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalLabel"></h5>
                <button type="button" class="close" aria-label="Close" onclick="CerrarModal()">
                    <span aria-hidden=" true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="form-group col-sm-12">
                        <label for="nombre">Deporte</label>
                        <input type="text" class="form-control form-control-sm" id="nombre" maxlength="100">
                    </div>
                </div>
                <div class="row">
                    <div class="form-group col-sm-12">
                        <label for="descripcion">Descripcion</label>
                        <textarea class="form-control form-control-sm" id="descripcion" rows="10" maxlength="5000"></textarea>
                    </div>
                </div>
                <div class="row">
                    <div class="form-group col-sm-12">
                        <label for="horarios">Horarios</label>
                        <textarea class="form-control form-control-sm" id="horarios" rows="6" maxlength="600"></textarea>
                    </div>
                </div>
                <div class="row">
                    <div class="form-group col-sm-12">
                        <label for="profesores">Profesores</label>
                        <textarea class="form-control form-control-sm" id="profesores" rows="6" maxlength="1000"></textarea>
                    </div>
                </div>

                
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="CerrarModal()">Cancelar</button>
                <button type="button" class="btn btn-success" id="btnAccion">Guardar</button>
            </div>
        </div>
    </div>
    </div>

<!-- MODAL VER (solo lectura) -->
<div class="modal fade" id="modalVer" tabindex="-1" aria-labelledby="modalVerLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalVerLabel">Ver deporte</h5>
                <button type="button" class="close" aria-label="Close" onclick="$('#modalVer').modal('hide')">
                    <span aria-hidden=" true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <h3 id="verNombre"></h3>
                <div id="verDescripcion" style="margin-bottom:1rem; white-space:pre-wrap; line-height:1.5;"></div>

                <!-- Horarios: listado debajo de la descripción -->
                <div class="mb-3">
                    <strong>Horarios:</strong>
                    <div id="verHorarios" style="margin-top:0.5rem;"></div>
                </div>

                <div>
                    <strong>Profesores:</strong>
                    <div id="verProfesores" style="margin-top:0.5rem;"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="$('#modalVer').modal('hide')">Cerrar</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    $(document).ready(async () => {
        getLista()
    })

    $("#txtFiltro").keyup(async function () {
        Filtrar()
    })
    
    const getLista = async () => {
        $("#preloaderAPP").show()
        const res = await $.post('/deportes/getListaAjax')
        let html = ""
        if(res.status){
            for (let i = 0; i < res.data.length; i++) {
                html += `
                    <tr>
                        <td>
                            <div style="display: flex; gap: 6px; align-items:center;">
                                <button class="btn btn-round btn-sm btn-info" onclick="Ver(${res.data[i].id})"
                                    data-toggle="tooltip" data-placement="top" title="Ver">
                                    <i class="fa fa-eye"></i>
                                </button>
                                {% if permisos.m == 1 %}
                                    <button class="btn btn-round btn-sm btn-warning" data-accion="m"
                                        data-toggle="tooltip" data-placement="top" title="Modificar" onclick="ModalAccion('m',${res.data[i].id})">
                                        <i class="fa fa-pen"></i>
                                    </button>
                                {% endif %}

                                {% if permisos.b == 1 %}
                                    <button class="btn btn-round btn-sm btn-danger" onclick="Eliminar(${res.data[i].id})"
                                        data-toggle="tooltip" data-placement="top" title="Eliminar">
                                        <i class="fa fa-trash-alt"></i>
                                    </button>
                                {% endif %}
                            </div>
                        </td>
                        <td class='search'>${res.data[i].nombre}</td>
                        <td>${res.data[i].descripcion}</td>
                    </tr>`
            }
        }else{
            html = `<tr><td class="font-weight-bold" colspan="3">${res.text}</td></tr>`
        }
        $('#tablaDatos tbody').html(html)
        $("#preloaderAPP").hide()
        $('[data-toggle="tooltip"]').tooltip()
    }

    const ModalAccion = async (accion, id) => {
        $("#preloaderAPP").show()
        if (accion === 'a') {
            $('#modalLabel').text('Nuevo deporte')
            $('#btnAccion').attr('onclick', `PostRegistro("a")`)
            $('#btnAccion').text('Guardar')
        }
        if (accion == 'm') {
            let res = await $.post(`/deportes/getByIdAjax`, {id})
            if (res.status != 0) {
                $('#nombre').val(res.data[0].nombre)
                $('#descripcion').val(res.data[0].descripcion)
                $('#horarios').val(res.data[0].horarios)
                $('#profesores').val(res.data[0].profesores)
            }
            $('#modalLabel').text('Modificar deporte')
            $('#btnAccion').text('Guardar')
            $('#btnAccion').attr('onclick', `PostRegistro("m",${id})`)
            $('#actionSeccion').removeClass('d-none')
            $('#actionSeccionDivider').removeClass('d-none')
        }
        $("#preloaderAPP").hide()
        $('#modal').modal('show')
    }

    const Ver = async (id) => {
        try {
            $('#preloaderAPP').show()
            let res = await $.post('/deportes/getByIdAjax', { id })
            $('#preloaderAPP').hide()
            if (res.status && res.data && res.data.length) {
                let d = res.data[0]
                $('#verNombre').text(d.nombre || '')

                // Descripción con saltos
                $('#verDescripcion').html((d.descripcion || '').toString().replace(/\n/g, '<br/>'))

                // Horarios: renderizar como lista (separadores: coma o salto de línea)
                let horariosRaw = (d.horarios || '').toString().trim()
                if (!horariosRaw) {
                    $('#verHorarios').html('<em>No hay horarios cargados</em>')
                } else {
                    let items = horariosRaw.split(/\r?\n|,/).map(s => s.trim()).filter(Boolean)
                    if (items.length) {
                        $('#verHorarios').html('<ul style="margin:0; padding-left:1rem;">' + items.map(it => `<li>${it}</li>`).join('') + '</ul>')
                    } else {
                        $('#verHorarios').text(horariosRaw)
                    }
                }

                // Profesores: renderizar como lista si corresponde
                let profsRaw = (d.profesores || '').toString().trim()
                if (!profsRaw) {
                    $('#verProfesores').html('<em>No hay profesores listados</em>')
                } else {
                    let profs = profsRaw.split(/\r?\n|,/).map(s => s.trim()).filter(Boolean)
                    if (profs.length) {
                        $('#verProfesores').html('<ul style="margin:0; padding-left:1rem;">' + profs.map(p => `<li>${p}</li>`).join('') + '</ul>')
                    } else {
                        $('#verProfesores').text(profsRaw)
                    }
                }

                $('#modalVer').modal('show')
            } else {
                Swal.fire({ icon: 'warning', title: 'Atención', text: res.text || 'No se encontró el deporte', timer: 2000 })
            }
        } catch (err) {
            console.log(err)
            $('#preloaderAPP').hide()
            Swal.fire({ icon: 'error', title: 'Error', text: 'Error al obtener el deporte', timer: 2000 })
        }
    }

    const PostRegistro = async (accion, Id) => {
        $("#preloaderAPP").show()
        let url = '/deportes/alta',
            body = {
                nombre: $('#nombre').val(),
                descripcion: $('#descripcion').val(),
                horarios: $('#horarios').val(),
                profesores: $('#profesores').val()
            }

        if (accion === 'm') {
            url = '/deportes/modificar'
            body.id = Id
        }

        const res = await $.post(url, body)
        $("#preloaderAPP").hide()
        Swal.fire({
            icon: res.icon,
            title: res.title, 
            text: res.text, 
            timer: 2000
        }).then(() => {
            if(res.status){
                CerrarModal()
                getLista()
            }
        })        
    }

    const Eliminar = (id) => {
        Swal.fire({
            title: 'Confirmar',
            text: "¿Desea borrar este registro?",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#3085d6',
            confirmButtonText: 'Sí, eliminar.',
            cancelButtonColor: '#d33',
            cancelButtonText: 'No, cancelar.'
        }).then(async result => {
            if (result.isConfirmed) {
                $("#preloaderAPP").show();
                let res = await $.post('/deportes/eliminar', { id })
                $("#preloaderAPP").hide();
                Swal.fire({
                    type: res.type,
                    icon: res.icon,
                    title: res.title,
                    text: res.text,
                    timer: 2000
                }).then(() => {
                    if(res.status){
                        CerrarModal()
                        getLista()
                    }
                })
            }    
        })
    }

    const Filtrar = () => {
        $('#tablaDatos tbody tr').each(function () {
            if ($(this).find('td.search').text().toUpperCase().indexOf($('#txtFiltro').val().toUpperCase()) > -1)
                $(this).closest('tr').show();
            else
                $(this).closest('tr').hide();
        })
    }

    const CerrarModal = () => {
        $('#modal').modal('hide')
        $('#actionSeccion').addClass('d-none')
        $('#actionSeccionDivider').addClass('d-none')
        LimpiarCampos()
    }

    const LimpiarCampos = () => {
        $('input[type="text"]').val('')
        $('textarea').val('')
        $('#cmbEquipo').val('')
        $('input[type="checkbox"]').prop('checked', false)
        $('input[type="radio"]').prop('checked', false)
    }

</script>
{% endblock %}
