{% extends '../../template.html' %}

{% block styles %}
<style>
.icon-btn-picker {
    width: 38px; height: 38px;
    border: 1px solid #ddd;
    background: #fff;
    border-radius: 4px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    transition: background .15s, border-color .15s;
    padding: 0;
}
.icon-btn-picker:hover { background: #f0f0f0; border-color: #999; }
.icon-btn-picker.selected { background: #232e38; border-color: #232e38; color: #fff; }
.icon-picker-panel {
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 10px;
    margin-top: 8px;
    background: #fafafa;
    position: relative;
    z-index: 10;
}
#iconGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(38px, 1fr));
    gap: 4px;
    max-height: 200px;
    overflow-y: auto;
}
.icon-preview-box {
    width: 42px; height: 42px;
    background: #232e38;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
}
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center">
    <h2>{{ pagename }}</h2>
    <div class="d-flex align-items-end mb-3" style="gap: 0.2rem;">
        <input type="text" class="form-control form-control-sm" id="txtFiltro" placeholder="Buscar" style="width: 10rem;" />
        {% if permisos.a == 1 %}
        <button class="btn btn-sm btn-round btn-success modalAccion mr-1" data-accion="a" onclick='ModalAccion("a")'>
            <i class="fa fa-plus"></i>
        </button>
        {% endif %}
    </div>
</div>
<div class="table-responsive" style="height: calc(100vh - 200px)" id="tablaDatos">
    <table class="table table-sm table-fix table-hover tableFixHead">
        <thead>
            <tr>
                <th scope="col">Acciones</th>
                <th scope="col" style="width:42px;"></th>
                <th scope="col">Deporte</th>
                <th scope="col">Descripcion</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- MODAL -->
<div class="modal fade modal-m" data-backdrop="static" data-bs-keyboard="false" tabindex="-1"
    aria-labelledby="staticBackdropLabel" aria-hidden="true" id="modal">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalLabel"></h5>
                <button type="button" class="close" aria-label="Close" onclick="CerrarModal()">
                    <span aria-hidden=" true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="form-group col-sm-12">
                        <label for="nombre">Deporte</label>
                        <input type="text" class="form-control form-control-sm" id="nombre" maxlength="100">
                    </div>
                </div>
                <div class="row">
                    <div class="form-group col-sm-12">
                        <label for="descripcion">Descripcion</label>
                        <textarea class="form-control form-control-sm" id="descripcion" rows="10" maxlength="5000"></textarea>
                    </div>
                </div>
                <div class="row">
                    <div class="form-group col-sm-12">
                        <label for="horarios">Horarios</label>
                        <textarea class="form-control form-control-sm" id="horarios" rows="6" maxlength="600"></textarea>
                    </div>
                </div>
                <div class="row">
                    <div class="form-group col-sm-12">
                        <label for="profesores">Profesores</label>
                        <textarea class="form-control form-control-sm" id="profesores" rows="6" maxlength="1000"></textarea>
                    </div>
                </div>
                <div class="row">
                    <div class="form-group col-sm-12">
                        <label>Ícono <small class="text-muted">(opcional)</small></label>
                        <div class="d-flex align-items-center" style="gap:10px;">
                            <div class="icon-preview-box">
                                <i id="iconPreviewIcon" class="fas fa-award" style="color:#fff;font-size:1.4rem;"></i>
                            </div>
                            <input type="hidden" id="icono" value="">
                            <button type="button" class="btn btn-sm btn-secondary" onclick="toggleIconPicker()">
                                <i class="fa fa-icons"></i> Seleccionar ícono
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-danger" onclick="clearIcono()" title="Quitar ícono">
                                <i class="fa fa-times"></i>
                            </button>
                        </div>
                        <div id="iconPickerPanel" class="icon-picker-panel" style="display:none;">
                            <input type="text" id="iconSearch" class="form-control form-control-sm mb-2"
                                placeholder="Buscar ícono..." oninput="renderIconGrid(this.value)">
                            <div id="iconGrid"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="CerrarModal()">Cancelar</button>
                <button type="button" class="btn btn-success" id="btnAccion">Guardar</button>
            </div>
        </div>
    </div>
    </div>

<!-- MODAL VER (solo lectura) -->
<div class="modal fade" id="modalVer" tabindex="-1" aria-labelledby="modalVerLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalVerLabel">Ver deporte</h5>
                <button type="button" class="close" aria-label="Close" onclick="$('#modalVer').modal('hide')">
                    <span aria-hidden=" true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <h3 id="verNombre"></h3>
                <div id="verDescripcion" style="margin-bottom:1rem; white-space:pre-wrap; line-height:1.5;"></div>

                <!-- Horarios: listado debajo de la descripción -->
                <div class="mb-3">
                    <strong>Horarios:</strong>
                    <div id="verHorarios" style="margin-top:0.5rem;"></div>
                </div>

                <div>
                    <strong>Profesores:</strong>
                    <div id="verProfesores" style="margin-top:0.5rem;"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="$('#modalVer').modal('hide')">Cerrar</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    $(document).ready(async () => {
        getLista()
    })

    $("#txtFiltro").keyup(async function () {
        Filtrar()
    })
    
    const getLista = async () => {
        $("#preloaderAPP").show()
        const res = await $.post('/deportes/getListaAjax')
        let html = ""
        if(res.status){
            for (let i = 0; i < res.data.length; i++) {
                html += `
                    <tr>
                        <td>
                            <div style="display: flex; gap: 6px; align-items:center;">
                                <button class="btn btn-round btn-sm btn-info" onclick="Ver(${res.data[i].id})"
                                    data-toggle="tooltip" data-placement="top" title="Ver">
                                    <i class="fa fa-eye"></i>
                                </button>
                                {% if permisos.m == 1 %}
                                    <button class="btn btn-round btn-sm btn-warning" data-accion="m"
                                        data-toggle="tooltip" data-placement="top" title="Modificar" onclick="ModalAccion('m',${res.data[i].id})">
                                        <i class="fa fa-pen"></i>
                                    </button>
                                {% endif %}

                                {% if permisos.b == 1 %}
                                    <button class="btn btn-round btn-sm btn-danger" onclick="Eliminar(${res.data[i].id})"
                                        data-toggle="tooltip" data-placement="top" title="Eliminar">
                                        <i class="fa fa-trash-alt"></i>
                                    </button>
                                {% endif %}
                            </div>
                        </td>
                        <td style="vertical-align:middle;">
                            ${res.data[i].icono
                                ? `<div style="width:34px;height:34px;background:#232e38;border-radius:4px;display:flex;align-items:center;justify-content:center;">
                                       <i class="${res.data[i].icono}" style="color:#fff;font-size:1rem;"></i>
                                   </div>`
                                : ''}
                        </td>
                        <td class='search'>${res.data[i].nombre}</td>
                        <td>${res.data[i].descripcion}</td>
                    </tr>`
            }
        }else{
            html = `<tr><td class="font-weight-bold" colspan="4">${res.text}</td></tr>`
        }
        $('#tablaDatos tbody').html(html)
        $("#preloaderAPP").hide()
        $('[data-toggle="tooltip"]').tooltip()
    }

    const ModalAccion = async (accion, id) => {
        $("#preloaderAPP").show()
        if (accion === 'a') {
            $('#modalLabel').text('Nuevo deporte')
            $('#btnAccion').attr('onclick', `PostRegistro("a")`)
            $('#btnAccion').text('Guardar')
        }
        if (accion == 'm') {
            let res = await $.post(`/deportes/getByIdAjax`, {id})
            if (res.status != 0) {
                $('#nombre').val(res.data[0].nombre)
                $('#descripcion').val(res.data[0].descripcion)
                $('#horarios').val(res.data[0].horarios)
                $('#profesores').val(res.data[0].profesores)
                const iconoCls = res.data[0].icono || ''
                $('#icono').val(iconoCls)
                document.getElementById('iconPreviewIcon').className = (iconoCls || 'fas fa-award') + ' fa-fw'
                document.getElementById('iconPreviewIcon').style.color = '#fff'
                document.getElementById('iconPreviewIcon').style.fontSize = '1.4rem'
            }
            $('#modalLabel').text('Modificar deporte')
            $('#btnAccion').text('Guardar')
            $('#btnAccion').attr('onclick', `PostRegistro("m",${id})`)
            $('#actionSeccion').removeClass('d-none')
            $('#actionSeccionDivider').removeClass('d-none')
        }
        $("#preloaderAPP").hide()
        $('#modal').modal('show')
    }

    const Ver = async (id) => {
        try {
            $('#preloaderAPP').show()
            let res = await $.post('/deportes/getByIdAjax', { id })
            $('#preloaderAPP').hide()
            if (res.status && res.data && res.data.length) {
                let d = res.data[0]
                $('#verNombre').text(d.nombre || '')

                // Descripción con saltos
                $('#verDescripcion').html((d.descripcion || '').toString().replace(/\n/g, '<br/>'))

                // Horarios: renderizar como lista (separadores: coma o salto de línea)
                let horariosRaw = (d.horarios || '').toString().trim()
                if (!horariosRaw) {
                    $('#verHorarios').html('<em>No hay horarios cargados</em>')
                } else {
                    let items = horariosRaw.split(/\r?\n|,/).map(s => s.trim()).filter(Boolean)
                    if (items.length) {
                        $('#verHorarios').html('<ul style="margin:0; padding-left:1rem;">' + items.map(it => `<li>${it}</li>`).join('') + '</ul>')
                    } else {
                        $('#verHorarios').text(horariosRaw)
                    }
                }

                // Profesores: renderizar como lista si corresponde
                let profsRaw = (d.profesores || '').toString().trim()
                if (!profsRaw) {
                    $('#verProfesores').html('<em>No hay profesores listados</em>')
                } else {
                    let profs = profsRaw.split(/\r?\n|,/).map(s => s.trim()).filter(Boolean)
                    if (profs.length) {
                        $('#verProfesores').html('<ul style="margin:0; padding-left:1rem;">' + profs.map(p => `<li>${p}</li>`).join('') + '</ul>')
                    } else {
                        $('#verProfesores').text(profsRaw)
                    }
                }

                $('#modalVer').modal('show')
            } else {
                Swal.fire({ icon: 'warning', title: 'Atención', text: res.text || 'No se encontró el deporte', timer: 2000 })
            }
        } catch (err) {
            console.log(err)
            $('#preloaderAPP').hide()
            Swal.fire({ icon: 'error', title: 'Error', text: 'Error al obtener el deporte', timer: 2000 })
        }
    }

    const PostRegistro = async (accion, Id) => {
        $("#preloaderAPP").show()
        let url = '/deportes/alta',
            body = {
                nombre: $('#nombre').val(),
                descripcion: $('#descripcion').val(),
                horarios: $('#horarios').val(),
                profesores: $('#profesores').val(),
                icono: $('#icono').val()
            }

        if (accion === 'm') {
            url = '/deportes/modificar'
            body.id = Id
        }

        const res = await $.post(url, body)
        $("#preloaderAPP").hide()
        Swal.fire({
            icon: res.icon,
            title: res.title, 
            text: res.text, 
            timer: 2000
        }).then(() => {
            if(res.status){
                CerrarModal()
                getLista()
            }
        })        
    }

    const Eliminar = (id) => {
        Swal.fire({
            title: 'Confirmar',
            text: "¿Desea borrar este registro?",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#3085d6',
            confirmButtonText: 'Sí, eliminar.',
            cancelButtonColor: '#d33',
            cancelButtonText: 'No, cancelar.'
        }).then(async result => {
            if (result.isConfirmed) {
                $("#preloaderAPP").show();
                let res = await $.post('/deportes/eliminar', { id })
                $("#preloaderAPP").hide();
                Swal.fire({
                    type: res.type,
                    icon: res.icon,
                    title: res.title,
                    text: res.text,
                    timer: 2000
                }).then(() => {
                    if(res.status){
                        CerrarModal()
                        getLista()
                    }
                })
            }    
        })
    }

    const Filtrar = () => {
        $('#tablaDatos tbody tr').each(function () {
            if ($(this).find('td.search').text().toUpperCase().indexOf($('#txtFiltro').val().toUpperCase()) > -1)
                $(this).closest('tr').show();
            else
                $(this).closest('tr').hide();
        })
    }

    const CerrarModal = () => {
        $('#modal').modal('hide')
        $('#actionSeccion').addClass('d-none')
        $('#actionSeccionDivider').addClass('d-none')
        LimpiarCampos()
    }

    const LimpiarCampos = () => {
        $('input[type="text"]').val('')
        $('textarea').val('')
        $('#cmbEquipo').val('')
        $('input[type="checkbox"]').prop('checked', false)
        $('input[type="radio"]').prop('checked', false)
        $('#icono').val('')
        document.getElementById('iconPreviewIcon').className = 'fas fa-award'
        document.getElementById('iconPickerPanel').style.display = 'none'
        document.getElementById('iconSearch').value = ''
    }

    /* ===================================================
       ICON PICKER — Font Awesome
    =================================================== */
    const FA_ICONS = [
        {cls:'fas fa-futbol',          name:'futbol'},
        {cls:'fas fa-basketball-ball', name:'basquet basket'},
        {cls:'fas fa-football-ball',   name:'football americano'},
        {cls:'fas fa-volleyball-ball', name:'voley voleibol'},
        {cls:'fas fa-baseball-ball',   name:'baseball beisbol'},
        {cls:'fas fa-hockey-puck',     name:'hockey'},
        {cls:'fas fa-golf-ball',       name:'golf'},
        {cls:'fas fa-bowling-ball',    name:'bowling bolos'},
        {cls:'fas fa-table-tennis',    name:'tenis de mesa ping pong'},
        {cls:'fas fa-swimmer',         name:'natacion swimming'},
        {cls:'fas fa-swimming-pool',   name:'pileta piscina'},
        {cls:'fas fa-running',         name:'atletismo running carrera'},
        {cls:'fas fa-biking',          name:'ciclismo bici'},
        {cls:'fas fa-skiing',          name:'ski esqui'},
        {cls:'fas fa-snowboarding',    name:'snowboard'},
        {cls:'fas fa-dumbbell',        name:'gym gimnasio pesas'},
        {cls:'fas fa-fist-raised',     name:'karate judo boxeo artes marciales'},
        {cls:'fas fa-hand-rock',       name:'boxeo puño'},
        {cls:'fas fa-horse',           name:'equitacion hipica'},
        {cls:'fas fa-fish',            name:'pesca fishing'},
        {cls:'fas fa-archery',         name:'tiro arco'},
        {cls:'fas fa-bullseye',        name:'tiro diana'},
        {cls:'fas fa-chess',           name:'ajedrez chess'},
        {cls:'fas fa-trophy',          name:'trofeo campeon'},
        {cls:'fas fa-medal',           name:'medalla'},
        {cls:'fas fa-stopwatch',       name:'tiempo cronometro'},
        {cls:'fas fa-flag',            name:'bandera'},
        {cls:'fas fa-shield-alt',      name:'escudo defensa'},
        {cls:'fas fa-star',            name:'estrella'},
        {cls:'fas fa-fire',            name:'fuego'},
        {cls:'fas fa-bolt',            name:'rayo energy'},
        {cls:'fas fa-crown',           name:'corona real'},
        {cls:'fas fa-heart',           name:'corazon'},
        {cls:'fas fa-people-carry',    name:'equipo'},
        {cls:'fas fa-users',           name:'grupo equipo'},
        {cls:'fas fa-user-friends',    name:'dupla pareja'},
        {cls:'fas fa-child',           name:'niños infanto juvenil'},
        {cls:'fas fa-baby',            name:'bebe mini'},
        {cls:'fas fa-person-booth',    name:'persona'},
        {cls:'fas fa-walking',         name:'caminata marcha'},
        {cls:'fas fa-mountain',        name:'montana escalada'},
        {cls:'fas fa-campground',      name:'campamento'},
        {cls:'fas fa-water',           name:'agua remo kayak'},
        {cls:'fas fa-wind',            name:'viento'},
        {cls:'fas fa-sun',             name:'sol outdoor'},
        {cls:'fas fa-leaf',            name:'naturaleza'},
        {cls:'fas fa-spa',             name:'yoga wellness'},
        {cls:'fas fa-heartbeat',       name:'cardio salud'},
        {cls:'fas fa-brain',           name:'mental mente'},
        {cls:'fas fa-music',           name:'musica danza'},
        {cls:'fas fa-gamepad',         name:'juego'},
        {cls:'fas fa-dice',            name:'dados juego de mesa'},
        {cls:'fas fa-arrows-alt',      name:'movimiento'},
        {cls:'fas fa-circle',          name:'circulo general'},
        {cls:'fas fa-award',           name:'premio distincion'},
    ]

    const renderIconGrid = (filter = '') => {
        const q = (filter || '').toLowerCase().trim()
        const list = q ? FA_ICONS.filter(i => i.name.includes(q) || i.cls.includes(q)) : FA_ICONS
        const current = $('#icono').val()
        document.getElementById('iconGrid').innerHTML = list.map(i => `
            <button type="button" class="icon-btn-picker ${i.cls === current ? 'selected' : ''}"
                onclick="selectIcono('${i.cls}')" title="${i.name}">
                <i class="${i.cls}"></i>
            </button>
        `).join('')
    }

    const toggleIconPicker = () => {
        const panel = document.getElementById('iconPickerPanel')
        const visible = panel.style.display !== 'none'
        panel.style.display = visible ? 'none' : 'block'
        if (!visible) {
            document.getElementById('iconSearch').value = ''
            renderIconGrid()
            document.getElementById('iconSearch').focus()
        }
    }

    const selectIcono = (cls) => {
        $('#icono').val(cls)
        const el = document.getElementById('iconPreviewIcon')
        el.className = cls
        el.style.color = '#fff'
        el.style.fontSize = '1.4rem'
        document.getElementById('iconPickerPanel').style.display = 'none'
    }

    const clearIcono = () => {
        $('#icono').val('')
        const el = document.getElementById('iconPreviewIcon')
        el.className = 'fas fa-award'
        el.style.color = '#fff'
        el.style.fontSize = '1.4rem'
        document.getElementById('iconPickerPanel').style.display = 'none'
    }

</script>
{% endblock %}
