{% extends '../../template.html' %}

{% block styles %}
<style>
.icon-btn-picker {
    width: 38px; height: 38px;
    border: 1px solid #ddd;
    background: #fff;
    border-radius: 4px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    transition: background .15s, border-color .15s;
    padding: 0;
}
.icon-btn-picker:hover { background: #f0f0f0; border-color: #999; }
.icon-btn-picker.selected { background: #232e38; border-color: #232e38; color: #fff; }
.icon-picker-panel {
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 10px;
    margin-top: 8px;
    background: #fafafa;
    position: relative;
    z-index: 10;
}
#iconGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(38px, 1fr));
    gap: 4px;
    max-height: 200px;
    overflow-y: auto;
}
.icon-preview-box {
    width: 42px; height: 42px;
    background: #232e38;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
}
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center">
    <h2>{{ pagename }}</h2>
<div class="d-flex align-items-end mb-3" style="gap:10px; flex-wrap:wrap;">

    <div>
        <label class="form-label">Desde</label>
        <input type="text" id="filtroDesde" class="form-control form-control-sm datepicker maskDate">
    </div>

    <div>
        <label class="form-label">Hasta</label>
        <input type="text" id="filtroHasta" class="form-control form-control-sm datepicker maskDate">
    </div>

    <div class="d-flex flex-column">
        <label class="form-label">Estado</label>
        <select id="filtroEstado" class="form-select form-select-sm selectpicker">
            <option value="">Todas</option>
            <option value="0">No leídas</option>
            <option value="1">Leídas</option>
        </select>
    </div>

    <div>
        <button class="btn btn-sm btn-round btn-primary" onclick="cargarQuejas()">
            <i class="fa fa-magnifying-glass"></i>
        </button>
    </div>

</div>
</div>
<div class="table-responsive" style="height: calc(100vh - 200px)" id="tablaDatos">
    <table class="table table-sm table-fix table-hover tableFixHead">
        <thead>
            <tr>
                <th>Acciones</th>
                <th>Anon.</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Mensaje</th>
                <th>Fecha</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>
<!-- MODAL VER QUEJA -->
<div class="modal fade" id="modalQueja" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Detalle de Queja</h5>
      </div>

      <div class="modal-body">

        <div class="row mb-2">

          <div class="col-md-6">
            <strong>Fecha:</strong>
            <span id="mq_fecha"></span>
          </div>
        </div>

        <div class="row mb-2">
          <div class="col-md-6">
            <strong>Nombre:</strong>
            <span id="mq_nombre"></span>
          </div>

          <div class="col-md-6">
            <strong>Email:</strong>
            <span id="mq_email"></span>
          </div>
        </div>

        <div class="mb-2">
          <strong>Mensaje:</strong>
          <div id="mq_mensaje" class="border rounded p-3 bg-light" style="white-space: pre-wrap;"></div>
        </div>
        <div class="mb-3">
            <label class="form-label"><strong>Estado</strong></label>
            <div class="custom-control custom-switch mt-1">
                <input type="checkbox" class="custom-control-input" id="mq_leida">
                <label class="custom-control-label" for="mq_leida" id="mq_leida_label">No leída</label>
            </div>
        </div>

        </div>
      <div class="modal-footer">
        <button class="btn btn-success" onclick="guardarEstado()">
            Guardar estado
        </button>
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Cerrar
        </button>
      </div>

    </div>
  </div>
</div>

 
{% endblock %}

{% block scripts %}
<script>
$(function () {
    try {
        $("#filtroDesde").val(generateFirstDateActualMonth());
    } catch (e) {
        console.warn('generateFirstDateActualMonth not available', e);
    }

    try {
        $("#filtroHasta").val(generateTodayDate());
    } catch (e) {
        console.warn('generateTodayDate not available', e);
    }

    try {
        $('.selectpicker').selectpicker();
    } catch (e) {
        // selectpicker not loaded
    }

    // toggle label update for mq_leida (custom-switch)
    try {
        $('#mq_leida').on('change', function () {
            $('#mq_leida_label').text(this.checked ? 'Leída' : 'No leída');
        });
    } catch (e) {
        // element may not exist yet
    }

    cargarQuejas();
});

function cargarQuejas() {

    const desde = document.getElementById("filtroDesde").value;
    const hasta = document.getElementById("filtroHasta").value;
    const estado = document.getElementById("filtroEstado").value;

    fetch("/quejas/getListaAjax", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            desde,
            hasta,
            estado
        })
    })
    .then(res => res.json())
    .then(response => {

        const tbody = document.querySelector("#tablaDatos tbody");
        tbody.innerHTML = "";

        if (!response.status) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="8" class="text-center text-muted">
                        No hay quejas registradas
                    </td>
                </tr>
            `;
            return;
        }

        response.data.forEach(q => {

            let anonimo = q.anonimo == 1
                ? '<span style="color:#6c757d;">Sí</span>'
                : '<span style="color:#198754;">No</span>';

            let nombre = q.anonimo == 1 ? "—" : (q.nombre || "");
            let email  = q.anonimo == 1 ? "—" : (q.email || "");

            let estado = q.leida == 1
                ? '<span style="color:#198754; font-weight:600;">Leída</span>'
                : '<span style="color:#dc3545; font-weight:600;">No leída</span>';

            let fila = `
                <tr>
                    <td>
                        <button class="btn btn-sm btn-info btn-round"
                            onclick="verQueja(${q.id})">
                            <i class="fa fa-eye"></i>
                        </button>
                    </td>
                    <td>${anonimo}</td>
                    <td>${nombre}</td>
                    <td>${email}</td>
                    <td style="max-width:250px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                        ${q.mensaje}
                    </td>
                    <td>${formatearFecha(q.fecha)}</td>
                    <td>${estado}</td>
                </tr>
            `;

            tbody.innerHTML += fila;
        });

    })
    .catch(error => {
        console.error(error);
    });
}

function formatearFecha(fecha) {
    let f = new Date(fecha);
    return f.toLocaleString("es-AR");
}
function verQueja(id) {
    quejaActual = id;

    fetch("/quejas/getByIdAjax", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ id })
    })
    .then(res => res.json())
    .then(response => {

        if (!response.status) {
            alert("Error al cargar la queja");
            return;
        }

        let q = response.data;

        if (Array.isArray(q)) {
            q = q[0];
        }

        document.getElementById("mq_fecha").innerText = formatearFecha(q.fecha);
        document.getElementById("mq_nombre").innerText = q.anonimo == 1 ? "Anónimo" : (q.nombre || "");
        document.getElementById("mq_email").innerText = q.anonimo == 1 ? "—" : (q.email || "");
        document.getElementById("mq_mensaje").innerText = q.mensaje || "";

        // set switch checked state and label (custom-switch)
        const mqSwitch = document.getElementById("mq_leida");
        const mqLabel = document.getElementById("mq_leida_label");
        mqSwitch.checked = (q.leida == 1);
        mqLabel.innerText = mqSwitch.checked ? 'Leída' : 'No leída';

        let modal = bootstrap.Modal.getOrCreateInstance(
            document.getElementById("modalQueja")
        );

        modal.show();

        marcarLeida(id);

    })
    .catch(error => {
        console.error(error);
    });
}
let quejaActual = null;

function guardarEstado() {

    const leida = document.getElementById("mq_leida").checked ? 1 : 0;

    fetch("/quejas/updateEstado", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            id: quejaActual,
            leida: leida
        })
    })
    .then(res => res.json())
    .then(response => {

        if(!response.status){
            alert("Error al guardar estado");
            return;
        }

        cargarQuejas();

        let modal = bootstrap.Modal.getInstance(
            document.getElementById("modalQueja")
        );

        modal.hide();

    })
}



</script>
{% endblock %}
